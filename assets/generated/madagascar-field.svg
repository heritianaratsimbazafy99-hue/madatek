<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 980" role="img" aria-labelledby="title desc">
  <title id="title">Madagascar operation field</title>
  <desc id="desc">Carte stylisee de Madagascar avec routes operationnelles, points lumineux et grille de donnees.</desc>
  <defs>
    <linearGradient id="island" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f74c3c"/>
      <stop offset=".45" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#42d9cf"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="45%" r="60%">
      <stop offset="0" stop-color="#f74c3c" stop-opacity=".4"/>
      <stop offset="1" stop-color="#f74c3c" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="820" height="980" rx="48" fill="#020b24"/>
  <rect x="34" y="34" width="752" height="912" rx="34" fill="#061a32" opacity=".7"/>
  <path d="M72 160h676M72 300h676M72 440h676M72 580h676M72 720h676M72 860h676M172 86v808M302 86v808M432 86v808M562 86v808M692 86v808" stroke="#fff" stroke-opacity=".055"/>
  <ellipse cx="433" cy="486" rx="330" ry="400" fill="url(#halo)"/>
  <path d="M434 82c52 35 71 94 68 151-3 58 30 88 65 130 49 59 41 130 17 190-26 64-3 114 12 172 18 67-4 128-52 166-46 37-107 27-134-20-36-61-18-118-47-169-38-66-105-108-98-184 7-78 70-116 66-187-4-75-44-111-18-176 20-51 70-94 121-73z" fill="#fff" opacity=".08"/>
  <path d="M426 103c42 39 55 90 48 143-8 59 19 90 52 133 42 55 34 117 9 173-25 58-1 108 13 160 16 59-1 109-42 143-34 29-77 21-101-17-32-51-16-106-45-154-40-67-89-104-83-169 7-68 64-104 63-171-1-71-40-104-16-162 18-43 59-78 102-79z" fill="none" stroke="url(#island)" stroke-width="4" filter="url(#softGlow)"/>
  <path d="M196 650c115-154 204-135 272-232 53-77 125-86 210-22" fill="none" stroke="#f74c3c" stroke-width="7" stroke-linecap="round" filter="url(#softGlow)"/>
  <path d="M196 650c115-154 204-135 272-232 53-77 125-86 210-22" fill="none" stroke="#fff" stroke-opacity=".75" stroke-width="2" stroke-linecap="round"/>
  <g fill="#f74c3c" filter="url(#softGlow)">
    <circle cx="196" cy="650" r="13"/>
    <circle cx="344" cy="516" r="10"/>
    <circle cx="468" cy="418" r="12"/>
    <circle cx="678" cy="396" r="13"/>
  </g>
  <g font-family="Arial, sans-serif" font-weight="700" fill="#fff">
    <text x="104" y="138" font-size="22" opacity=".75">ANTANANARIVO OPS</text>
    <text x="104" y="176" font-size="58" letter-spacing="4">BPO FIELD</text>
    <text x="104" y="214" font-size="16" letter-spacing="5" fill="#f74c3c">HUMAIN + DATA + SECURITE</text>
  </g>
  <g fill="none" stroke="#42d9cf" stroke-width="3" opacity=".9">
    <rect x="104" y="792" width="168" height="48" rx="10"/>
    <rect x="300" y="792" width="168" height="48" rx="10"/>
    <rect x="496" y="792" width="168" height="48" rx="10"/>
  </g>
  <g fill="#fff" font-family="Arial, sans-serif" font-size="16" font-weight="700" opacity=".8">
    <text x="126" y="824">APPELS</text>
    <text x="326" y="824">TCHAT</text>
    <text x="526" y="824">BACK OFFICE</text>
  </g>
</svg>
