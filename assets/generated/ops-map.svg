  <path d="M142 365c92-126 187-101 252-168 78-80 134-90 212-29 67 53 106 78 176 29" fill="none" stroke="#ffffff" stroke-opacity=".72" stroke-width="2" stroke-linecap="round"/>
  <g fill="#f74c3c">
