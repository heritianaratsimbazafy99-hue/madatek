<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" role="img" aria-labelledby="title desc">
  <title id="title">Carte operationnelle Madatek</title>
  <desc id="desc">Illustration abstraite d'un centre d'operations BPO connectant appels, chat, donnees et support humain.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0c2740"/>
      <stop offset="1" stop-color="#03091b"/>
    </linearGradient>
    <linearGradient id="red" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#ff2720"/>
      <stop offset="1" stop-color="#f74c3c"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="920" height="560" rx="34" fill="url(#panel)"/>
  <path d="M60 116h800M60 216h800M60 316h800M60 416h800M160 64v432M300 64v432M440 64v432M580 64v432M720 64v432" stroke="#ffffff" stroke-opacity=".08"/>
